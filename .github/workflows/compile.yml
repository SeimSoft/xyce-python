name: Compile Xyce

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master", "release/*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-unix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: macos-26-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ gfortran bison flex libfl-dev libsuitesparse-dev libopenblas-dev libfftw3-dev python3-dev pybind11-dev wget tar autoconf automake libtool libopenmpi-dev openmpi-bin

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake gcc bison flex suite-sparse openblas fftw python3 pybind11 wget autoconf automake libtool open-mpi

      - name: Cache Trilinos
        id: cache-trilinos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/trilinos-install
          key: trilinos-12.12.1-${{ matrix.os }}-v1

      - name: Build and Install Trilinos
        if: steps.cache-trilinos.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/trilinos/Trilinos/archive/refs/tags/trilinos-release-12-12-1.tar.gz -O trilinos.tar.gz
          mkdir -p trilinos-src
          tar -xzf trilinos.tar.gz -C trilinos-src --strip-components=1

          # Patch ancient CMake requirements that fail in macOS nested try_compile tests
          python3 -c '
          import os, re
          for d, _, files in os.walk("trilinos-src"):
              if "CMakeLists.txt" in files:
                  path = os.path.join(d, "CMakeLists.txt")
                  try:
                      with open(path, "r", encoding="utf-8") as f: content = f.read()
                      new_content = re.sub(r"(?i)cmake_minimum_required\s*\(\s*VERSION\s+[23]\.[0-9]+.*?\)", "cmake_minimum_required(VERSION 3.16)", content)
                      if new_content != content:
                          with open(path, "w", encoding="utf-8") as f: f.write(new_content)
                  except Exception: pass
          '

          mkdir -p trilinos-build trilinos-install
          cd trilinos-build

          AMD_LIB_DIR=""
          AMD_INC_DIR=""
          if [ "$RUNNER_OS" == "macOS" ]; then
            AMD_LIB_DIR="$(brew --prefix suite-sparse)/lib"
            AMD_INC_DIR="$(brew --prefix suite-sparse)/include/suitesparse"
          elif [ "$RUNNER_OS" == "Linux" ]; then
            AMD_LIB_DIR="/usr/lib/x86_64-linux-gnu"
            AMD_INC_DIR="/usr/include/suitesparse"
          fi

          FLAGS="-O3 -fPIC -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Force Homebrew OpenMPI to use gcc/g++ instead of clang
            export OMPI_CC=gcc-14
            export OMPI_CXX=g++-14
            export OMPI_FC=gfortran-14
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
          elif [ "$RUNNER_OS" == "Linux" ]; then
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
          fi

          cmake -G "Unix Makefiles" \
            -D CMAKE_C_COMPILER="$CC" -D CMAKE_CXX_COMPILER="$CXX" -D CMAKE_Fortran_COMPILER="$F77" \
            -D CMAKE_CXX_FLAGS="$FLAGS" -D CMAKE_C_FLAGS="$FLAGS" -D CMAKE_Fortran_FLAGS="$FLAGS" \
            -D CMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/trilinos-install" \
            -D Trilinos_ENABLE_NOX=ON -D NOX_ENABLE_LOCA=ON \
            -D Trilinos_ENABLE_EpetraExt=ON -D EpetraExt_BUILD_BTF=ON -D EpetraExt_BUILD_EXPERIMENTAL=ON -D EpetraExt_BUILD_GRAPH_REORDERINGS=ON \
            -D Trilinos_ENABLE_TrilinosCouplings=ON -D Trilinos_ENABLE_Ifpack=ON \
            -D Trilinos_ENABLE_Isorropia=ON \
            -D Trilinos_ENABLE_AztecOO=ON -D Trilinos_ENABLE_Belos=ON -D Trilinos_ENABLE_Teuchos=ON \
            -D Trilinos_ENABLE_COMPLEX_DOUBLE=ON -D Trilinos_ENABLE_Amesos=ON -D Amesos_ENABLE_KLU=ON \
            -D Trilinos_ENABLE_Amesos2=ON -D Amesos2_ENABLE_KLU2=ON -D Amesos2_ENABLE_Basker=ON \
            -D Trilinos_ENABLE_Sacado=ON -D Trilinos_ENABLE_Stokhos=ON -D Trilinos_ENABLE_Kokkos=ON \
            -D Trilinos_ENABLE_Zoltan=ON \
            -D Trilinos_ENABLE_ALL_OPTIONAL_PACKAGES=OFF -D Trilinos_ENABLE_CXX11=ON \
            -D TPL_ENABLE_AMD=ON -D AMD_LIBRARY_DIRS="$AMD_LIB_DIR" -D TPL_AMD_INCLUDE_DIRS="$AMD_INC_DIR" \
            -D TPL_ENABLE_BLAS=ON -D TPL_ENABLE_LAPACK=ON \
            -D TPL_ENABLE_MPI=ON \
            -D Trilinos_SKIP_FORTRANCINTERFACE_VERIFY_TEST=ON \
            ../trilinos-src

          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make install

      - name: Build and Install Xyce
        run: |
          ./bootstrap
          mkdir xyce-build
          cd xyce-build

          if [ "$RUNNER_OS" == "macOS" ]; then
            export LEX="$(brew --prefix flex)/bin/flex"
            export BISON="$(brew --prefix bison)/bin/bison"

            PYTHON_INC=$(python3-config --includes)
            PYTHON_LDFLAGS=$(python3-config --ldflags --embed)
            PYBIND11_INC="-I$(brew --prefix pybind11)/include"

            export CPPFLAGS="-I$(brew --prefix suite-sparse)/include/suitesparse -I$(brew --prefix suite-sparse)/include -I$(brew --prefix fftw)/include -I$(brew --prefix)/include -I$(brew --prefix flex)/include $PYTHON_INC $PYBIND11_INC"
            export LDFLAGS="-Wl,-framework,Accelerate -L$(brew --prefix suite-sparse)/lib -L$(brew --prefix fftw)/lib -L$(brew --prefix flex)/lib -L$(brew --prefix)/lib $PYTHON_LDFLAGS"
            export OMPI_CC=gcc-14
            export OMPI_CXX=g++-14
            export OMPI_FC=gfortran-14
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
            export FC=mpif90
            FLAGS="-O3 -Wno-deprecated -D_DARWIN_C_SOURCE"

          elif [ "$RUNNER_OS" == "Linux" ]; then
            export CPPFLAGS="$(python3-config --includes)"
            export LDFLAGS="$(python3-config --ldflags --embed)"
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
            export FC=mpif90
            FLAGS="-O3"
          fi

          export CXXFLAGS="$FLAGS"
          export CFLAGS="$FLAGS"
          export FFLAGS="$FLAGS"

          ../configure \
            CC="$CC" CXX="$CXX" F77="$F77" FC="$FC" \
            --prefix="${{ github.workspace }}/xyce-install" \
            ARCHDIR="${{ github.workspace }}/trilinos-install" \
            --enable-mpi \
            --enable-stokhos \
            --enable-amesos2 \
            --enable-fftw

          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make install

      - name: Package Binaries
        run: |
          cd ${{ github.workspace }}/xyce-install
          tar -czvf ${{ github.workspace }}/xyce-${{ matrix.os }}.tar.gz bin lib include

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xyce-${{ matrix.os }}
          path: ${{ github.workspace }}/xyce-${{ matrix.os }}.tar.gz

  build-windows:
    name: Build on windows-latest
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install MS-MPI
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.1/msmpisetup.exe" -OutFile msmpisetup.exe
          Start-Process -FilePath .\msmpisetup.exe -ArgumentList "-unattend" -Wait
          Invoke-WebRequest -Uri "https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.1/msmpisdk.msi" -OutFile msmpisdk.msi
          Start-Process msiexec.exe -ArgumentList "/i msmpisdk.msi /quiet" -Wait
          echo "MSMPI_INC=C:\Program Files (x86)\Microsoft SDKs\MPI\Include" >> $env:GITHUB_ENV
          echo "MSMPI_LIB64=C:\Program Files (x86)\Microsoft SDKs\MPI\Lib\x64" >> $env:GITHUB_ENV
          echo "C:\Program Files\Microsoft MPI\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Dependencies
        shell: pwsh
        run: |
          choco install ninja cmake python3 winflexbison3 -y
          pip install pybind11
          vcpkg install openblas:x64-windows

      - name: Cache Trilinos
        id: cache-trilinos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\trilinos-install
          key: trilinos-12.12.1-windows-msvc-v1

      - name: Download and Patch Trilinos
        if: steps.cache-trilinos.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/trilinos/Trilinos/archive/refs/tags/trilinos-release-12-12-1.zip" -OutFile trilinos.zip
          Expand-Archive -Path trilinos.zip -DestinationPath .
          Rename-Item -Path "Trilinos-trilinos-release-12-12-1" -NewName "trilinos-src"

          # Patch ancient CMake requirements
          python -c @"
          import os, re
          for d, _, files in os.walk('trilinos-src'):
              if 'CMakeLists.txt' in files:
                  path = os.path.join(d, 'CMakeLists.txt')
                  try:
                      with open(path, 'r', encoding='utf-8') as f: content = f.read()
                      new_content = re.sub(r'(?i)cmake_minimum_required\s*\(\s*VERSION\s+[23]\.[0-9]+.*?\)', 'cmake_minimum_required(VERSION 3.16)', content)
                      if new_content != content:
                          with open(path, 'w', encoding='utf-8') as f: f.write(new_content)
                  except Exception: pass
          "@

      - name: Build and Install Trilinos
        if: steps.cache-trilinos.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          mkdir trilinos-build
          mkdir trilinos-install
          cd trilinos-build

          cmake -G "Ninja" ^
            -D CMAKE_C_COMPILER=cl -D CMAKE_CXX_COMPILER=cl ^
            -D CMAKE_CXX_FLAGS="/O2 /EHsc /DWIN32" ^
            -D CMAKE_C_FLAGS="/O2 /DWIN32" ^
            -D CMAKE_POLICY_VERSION_MINIMUM=3.5 ^
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}\trilinos-install" ^
            -D Trilinos_ENABLE_Fortran=OFF -D Trilinos_ENABLE_Tpetra=ON ^
            -D Trilinos_ENABLE_NOX=ON -D NOX_ENABLE_LOCA=ON ^
            -D Trilinos_ENABLE_EpetraExt=ON -D EpetraExt_BUILD_BTF=ON -D EpetraExt_BUILD_EXPERIMENTAL=ON -D EpetraExt_BUILD_GRAPH_REORDERINGS=ON ^
            -D Trilinos_ENABLE_TrilinosCouplings=ON -D Trilinos_ENABLE_Ifpack=ON ^
            -D Trilinos_ENABLE_Isorropia=ON ^
            -D Trilinos_ENABLE_AztecOO=ON -D Trilinos_ENABLE_Belos=ON -D Trilinos_ENABLE_Teuchos=ON ^
            -D Trilinos_ENABLE_COMPLEX_DOUBLE=ON -D Trilinos_ENABLE_Amesos=ON -D Amesos_ENABLE_KLU=ON ^
            -D Trilinos_ENABLE_Amesos2=ON -D Amesos2_ENABLE_KLU2=ON -D Amesos2_ENABLE_Basker=ON ^
            -D Trilinos_ENABLE_Sacado=ON -D Trilinos_ENABLE_Stokhos=ON -D Trilinos_ENABLE_Kokkos=ON ^
            -D Trilinos_ENABLE_Zoltan=ON ^
            -D Trilinos_ENABLE_ALL_OPTIONAL_PACKAGES=OFF -D Trilinos_ENABLE_CXX11=ON ^
            -D TPL_ENABLE_AMD=OFF ^
            -D TPL_ENABLE_BLAS=ON -D TPL_ENABLE_LAPACK=ON ^
            -D TPL_BLAS_LIBRARIES="%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\lib\openblas.lib" ^
            -D TPL_LAPACK_LIBRARIES="%VCPKG_INSTALLATION_ROOT%\installed\x64-windows\lib\openblas.lib" ^
            -D TPL_ENABLE_MPI=ON ^
            -D MPI_BASE_DIR="C:\Program Files (x86)\Microsoft SDKs\MPI" ^
            -D Trilinos_SKIP_FORTRANCINTERFACE_VERIFY_TEST=ON ^
            ..\trilinos-src

          ninja -j%NUMBER_OF_PROCESSORS%
          ninja install

      - name: Upload Trilinos Build Artifacts
        if: steps.cache-trilinos.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trilinos-windows-msvc
          path: ${{ github.workspace }}\trilinos-install

  release:
    name: Create GitHub Release
    needs: [build-unix]
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xyce-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: artifacts/*
          draft: false
          prerelease: false
