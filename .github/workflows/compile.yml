name: Compile Xyce

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
          - os: macos-26-intel
            shell: bash
          - os: windows-latest
            shell: msys2 {0}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pybind11
            mingw-w64-x86_64-suitesparse
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-openblas
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-gcc-fortran
            make
            bison
            flex
            wget
            unzip
            tar

      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ gfortran bison flex libfl-dev libsuitesparse-dev libopenblas-dev libfftw3-dev python3-dev pybind11-dev wget tar autoconf automake libtool libopenmpi-dev openmpi-bin

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake gcc bison flex suite-sparse openblas fftw python3 pybind11 wget autoconf automake libtool open-mpi

      - name: Cache Trilinos
        id: cache-trilinos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/trilinos-install
          key: trilinos-12.12.1-${{ matrix.os }}-v1

      - name: Build and Install Trilinos
        if: steps.cache-trilinos.outputs.cache-hit != 'true'
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            wget https://github.com/trilinos/Trilinos/archive/refs/tags/trilinos-release-12-12-1.zip -O trilinos.zip
            unzip -q trilinos.zip
            mv Trilinos-trilinos-release-12-12-1 trilinos-src
          else
            wget https://github.com/trilinos/Trilinos/archive/refs/tags/trilinos-release-12-12-1.tar.gz -O trilinos.tar.gz
            mkdir -p trilinos-src
            tar -xzf trilinos.tar.gz -C trilinos-src --strip-components=1
          fi
          
          # Patch ancient CMake requirements that fail in macOS nested try_compile tests
          python3 -c '
          import os, re
          for d, _, files in os.walk("trilinos-src"):
              if "CMakeLists.txt" in files:
                  path = os.path.join(d, "CMakeLists.txt")
                  try:
                      with open(path, "r", encoding="utf-8") as f: content = f.read()
                      new_content = re.sub(r"(?i)cmake_minimum_required\s*\(\s*VERSION\s+[23]\.[0-9]+.*?\)", "cmake_minimum_required(VERSION 3.16)", content)
                      if new_content != content:
                          with open(path, "w", encoding="utf-8") as f: f.write(new_content)
                  except Exception: pass
          
          kokkos_atomic = "trilinos-src/packages/kokkos/core/src/Kokkos_Atomic.hpp"
          if os.path.exists(kokkos_atomic):
              with open(kokkos_atomic, "r", encoding="utf-8") as f: content = f.read()
              content = content.replace("#if defined(_WIN32)", "#if defined(_WIN32) && !defined(__MINGW32__)")
              content = content.replace("#ifdef _WIN32", "#if defined(_WIN32) && !defined(__MINGW32__)")
              content = content.replace("#ifndef _WIN32", "#if !defined(_WIN32) || defined(__MINGW32__)")
              
              mingw_atomics = """
#ifdef __MINGW32__
namespace Kokkos {
inline long long int atomic_fetch_add(volatile long long int* const dest, const long long int val) { return __sync_fetch_and_add(dest, val); }
inline unsigned long long int atomic_fetch_add(volatile unsigned long long int* const dest, const unsigned long long int val) { return __sync_fetch_and_add(dest, val); }
inline long long int atomic_fetch_sub(volatile long long int* const dest, const long long int val) { return __sync_fetch_and_sub(dest, val); }
inline unsigned long long int atomic_fetch_sub(volatile unsigned long long int* const dest, const unsigned long long int val) { return __sync_fetch_and_sub(dest, val); }
inline long long int atomic_compare_exchange(volatile long long int* const dest, const long long int compare, const long long int val) { return __sync_val_compare_and_swap(dest, compare, val); }
inline unsigned long long int atomic_compare_exchange(volatile unsigned long long int* const dest, const unsigned long long int compare, const unsigned long long int val) { return __sync_val_compare_and_swap(dest, compare, val); }
inline long long int atomic_exchange(volatile long long int* const dest, const long long int val) {
  long long int assumed;
  long long int old = *dest;
  do { assumed = old; old = __sync_val_compare_and_swap(dest, assumed, val); } while (assumed != old);
  return old;
}
inline unsigned long long int atomic_exchange(volatile unsigned long long int* const dest, const unsigned long long int val) {
  unsigned long long int assumed;
  unsigned long long int old = *dest;
  do { assumed = old; old = __sync_val_compare_and_swap(dest, assumed, val); } while (assumed != old);
  return old;
}
}
#endif
"""
              if "atomic_fetch_add(volatile long long int" not in content:
                  content += mingw_atomics
                  
              with open(kokkos_atomic, "w", encoding="utf-8") as f: f.write(content)
          '
          
          mkdir -p trilinos-build trilinos-install
          cd trilinos-build

          AMD_LIB_DIR=""
          AMD_INC_DIR=""
          if [ "$RUNNER_OS" == "macOS" ]; then
            AMD_LIB_DIR="$(brew --prefix suite-sparse)/lib"
            AMD_INC_DIR="$(brew --prefix suite-sparse)/include/suitesparse"
          elif [ "$RUNNER_OS" == "Linux" ]; then
            AMD_LIB_DIR="/usr/lib/x86_64-linux-gnu"
            AMD_INC_DIR="/usr/include/suitesparse"
          elif [ "$RUNNER_OS" == "Windows" ]; then
            AMD_LIB_DIR="/mingw64/lib"
            AMD_INC_DIR="/mingw64/include/suitesparse"
          fi

          FLAGS="-O3 -fPIC -DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Force Homebrew OpenMPI to use gcc/g++ instead of clang
            export OMPI_CC=gcc-14
            export OMPI_CXX=g++-14
            export OMPI_FC=gfortran-14
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
          elif [ "$RUNNER_OS" == "Linux" ]; then
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
          elif [ "$RUNNER_OS" == "Windows" ]; then
            export CC=gcc
            export CXX=g++
            export F77=gfortran
            CMAKE_EXTRA_ARGS="-DTrilinos_ENABLE_Fortran=ON -DTrilinos_ENABLE_Tpetra=ON -DTPL_BLAS_LIBRARIES=/mingw64/lib/libopenblas.dll.a -DTPL_LAPACK_LIBRARIES=/mingw64/lib/libopenblas.dll.a -DTPL_ENABLE_DLlib=OFF"
          else
            CMAKE_EXTRA_ARGS=""
          fi

          cmake -G "Unix Makefiles" $CMAKE_EXTRA_ARGS \
            -D CMAKE_C_COMPILER="$CC" -D CMAKE_CXX_COMPILER="$CXX" -D CMAKE_Fortran_COMPILER="$F77" \
            -D CMAKE_CXX_FLAGS="$FLAGS" -D CMAKE_C_FLAGS="$FLAGS" -D CMAKE_Fortran_FLAGS="$FLAGS" \
            -D CMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/trilinos-install" \
            -D Trilinos_ENABLE_NOX=ON -D NOX_ENABLE_LOCA=ON \
            -D Trilinos_ENABLE_EpetraExt=ON -D EpetraExt_BUILD_BTF=ON -D EpetraExt_BUILD_EXPERIMENTAL=ON -D EpetraExt_BUILD_GRAPH_REORDERINGS=ON \
            -D Trilinos_ENABLE_TrilinosCouplings=ON -D Trilinos_ENABLE_Ifpack=ON \
            -D Trilinos_ENABLE_Isorropia=ON \
            -D Trilinos_ENABLE_AztecOO=ON -D Trilinos_ENABLE_Belos=ON -D Trilinos_ENABLE_Teuchos=ON \
            -D Trilinos_ENABLE_COMPLEX_DOUBLE=ON -D Trilinos_ENABLE_Amesos=ON -D Amesos_ENABLE_KLU=ON \
            -D Trilinos_ENABLE_Amesos2=ON -D Amesos2_ENABLE_KLU2=ON -D Amesos2_ENABLE_Basker=ON \
            -D Trilinos_ENABLE_Sacado=ON -D Trilinos_ENABLE_Stokhos=ON -D Trilinos_ENABLE_Kokkos=ON \
            -D Trilinos_ENABLE_Zoltan=ON \
            -D Trilinos_ENABLE_ALL_OPTIONAL_PACKAGES=OFF -D Trilinos_ENABLE_CXX11=ON \
            -D TPL_ENABLE_AMD=ON -D AMD_LIBRARY_DIRS="$AMD_LIB_DIR" -D TPL_AMD_INCLUDE_DIRS="$AMD_INC_DIR" \
            -D TPL_ENABLE_BLAS=ON -D TPL_ENABLE_LAPACK=ON \
            -D TPL_ENABLE_MPI=ON \
            -D Trilinos_SKIP_FORTRANCINTERFACE_VERIFY_TEST=ON \
            ../trilinos-src
            
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make install

      - name: Build and Install Xyce
        run: |
          ./bootstrap
          mkdir xyce-build
          cd xyce-build

          if [ "$RUNNER_OS" == "macOS" ]; then
            export LEX="$(brew --prefix flex)/bin/flex"
            export BISON="$(brew --prefix bison)/bin/bison"
            
            PYTHON_INC=$(python3-config --includes)
            PYTHON_LDFLAGS=$(python3-config --ldflags --embed)
            PYBIND11_INC="-I$(brew --prefix pybind11)/include"
            
            export CPPFLAGS="-I$(brew --prefix suite-sparse)/include/suitesparse -I$(brew --prefix suite-sparse)/include -I$(brew --prefix fftw)/include -I$(brew --prefix)/include -I$(brew --prefix flex)/include $PYTHON_INC $PYBIND11_INC"
            export LDFLAGS="-Wl,-framework,Accelerate -L$(brew --prefix suite-sparse)/lib -L$(brew --prefix fftw)/lib -L$(brew --prefix flex)/lib -L$(brew --prefix)/lib $PYTHON_LDFLAGS"
            export OMPI_CC=gcc-14
            export OMPI_CXX=g++-14
            export OMPI_FC=gfortran-14
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
            export FC=mpif90
            FLAGS="-O3 -Wno-deprecated -D_DARWIN_C_SOURCE"

          elif [ "$RUNNER_OS" == "Linux" ]; then
            export CPPFLAGS="$(python3-config --includes)"
            export LDFLAGS="$(python3-config --ldflags --embed)"
            export CC=mpicc
            export CXX=mpicxx
            export F77=mpif77
            export FC=mpif90
            FLAGS="-O3"

          elif [ "$RUNNER_OS" == "Windows" ]; then
            export CPPFLAGS="$(python3-config --includes) -I/mingw64/include/suitesparse -I/mingw64/include"
            export LDFLAGS="$(python3-config --ldflags --embed) -lmsmpi"
            export CC=gcc
            export CXX=g++
            export F77=gfortran
            export FC=gfortran
            export MPICC=gcc
            export MPICXX=g++
            export MPIF77=gfortran
            export MPIFC=gfortran
            FLAGS="-O3"
          fi

          export CXXFLAGS="$FLAGS"
          export CFLAGS="$FLAGS"
          export FFLAGS="$FLAGS"

          ../configure \
            CC="$CC" CXX="$CXX" F77="$F77" FC="$FC" \
            --prefix="${{ github.workspace }}/xyce-install" \
            ARCHDIR="${{ github.workspace }}/trilinos-install" \
            --enable-mpi \
            --enable-stokhos \
            --enable-amesos2 \
            --enable-fftw

          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make install

      - name: Package Binaries
        shell: bash
        run: |
          cd ${{ github.workspace }}/xyce-install
          tar -czvf ${{ github.workspace }}/xyce-${{ runner.os }}.tar.gz bin lib include

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xyce-binaries-${{ runner.os }}
          path: ${{ github.workspace }}/xyce-${{ runner.os }}.tar.gz
